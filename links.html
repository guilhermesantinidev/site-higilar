<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HigiLar Santa Maria | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A192F;
            --secondary: #00B4D8;
            --accent: #D4AF37;
            --text-light: #F8F9FA;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo com textura sutil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,180,216,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Logo / avatar */
        .brand-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
            gap: 12px;
        }

        .logo-ring {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 3px;
            box-shadow: 0 0 24px rgba(212,175,55,0.25);
        }

        .logo-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--primary);
        }

        /* Fallback: logo em texto caso a imagem não carregue */
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.5px;
        }
        .logo-text .higi { color: var(--text-light); }
        .logo-text .lar  { color: var(--secondary); }

        .handle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-light);
            letter-spacing: 0.3px;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }

        /* Divisor decorativo */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            border-radius: 2px;
            margin: 4px 0 8px;
        }

        /* Links */
        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            border: 1px solid rgba(255,255,255,0.07);
            position: relative;
            overflow: hidden;
        }

        .link-btn::after {
            content: '›';
            position: absolute;
            right: 20px;
            font-size: 1.2rem;
            opacity: 0.4;
            transition: opacity 0.2s, right 0.2s;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .link-btn:hover::after {
            opacity: 0.8;
            right: 16px;
        }

        .link-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
        }

        .link-label {
            flex: 1;
        }

        /* Variantes de cor por botão */
        .btn-whatsapp {
            background: linear-gradient(135deg, rgba(37,211,102,0.15), rgba(37,211,102,0.08));
            color: #4ade80;
            border-color: rgba(37,211,102,0.2);
        }
        .btn-whatsapp:hover {
            background: linear-gradient(135deg, rgba(37,211,102,0.25), rgba(37,211,102,0.15));
            border-color: rgba(37,211,102,0.4);
        }

        .btn-site {
            background: linear-gradient(135deg, rgba(0,180,216,0.15), rgba(0,180,216,0.08));
            color: var(--secondary);
            border-color: rgba(0,180,216,0.2);
        }
        .btn-site:hover {
            background: linear-gradient(135deg, rgba(0,180,216,0.25), rgba(0,180,216,0.15));
            border-color: rgba(0,180,216,0.4);
        }

        .btn-google {
            background: linear-gradient(135deg, rgba(251,188,5,0.15), rgba(251,188,5,0.08));
            color: #fbbf24;
            border-color: rgba(251,188,5,0.2);
        }
        .btn-google:hover {
            background: linear-gradient(135deg, rgba(251,188,5,0.25), rgba(251,188,5,0.15));
            border-color: rgba(251,188,5,0.4);
        }

        .btn-facebook {
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.08));
            color: #60a5fa;
            border-color: rgba(59,130,246,0.2);
        }
        .btn-facebook:hover {
            background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(59,130,246,0.15));
            border-color: rgba(59,130,246,0.4);
        }

        .btn-instagram {
            background: linear-gradient(135deg, rgba(225,48,108,0.15), rgba(193,53,132,0.08));
            color: #f472b6;
            border-color: rgba(225,48,108,0.2);
        }
        .btn-instagram:hover {
            background: linear-gradient(135deg, rgba(225,48,108,0.25), rgba(193,53,132,0.15));
            border-color: rgba(225,48,108,0.4);
        }

        /* Selo de anos de experiência */
        .trust-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 50px;
            padding: 8px 18px;
            margin-bottom: 28px;
        }

        .trust-badge .years {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .trust-badge .desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        /* Rodapé */
        .footer-link {
            font-size: 0.75rem;
            color: rgba(148,163,184,0.4);
            text-decoration: none;
            transition: color 0.2s;
            margin-top: 8px;
        }
        .footer-link:hover {
            color: var(--text-muted);
        }

        /* Animação de entrada */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-area  { animation: fadeUp 0.5s ease both; }
        .trust-badge { animation: fadeUp 0.5s 0.1s ease both; }
        .links-list  { animation: fadeUp 0.5s 0.2s ease both; }
        .footer-link { animation: fadeUp 0.5s 0.3s ease both; }
    </style>
</head>
<body>

    <div class="card">

        <!-- Logo e identidade -->
        <div class="brand-area">
            <div class="logo-ring">
                <!-- Substitua o src pelo caminho correto da logo quando disponível -->
                <img src="higilar_img_site.png" alt="HigiLar Logo"
                     onerror="this.style.display='none'; this.parentElement.querySelector('.logo-fallback').style.display='flex'">
                <div class="logo-fallback" style="display:none; width:100%; height:100%; border-radius:50%; background:var(--primary); align-items:center; justify-content:center;">
                    <span class="logo-text"><span class="higi">Higi</span><span class="lar">Lar</span></span>
                </div>
            </div>
            <span class="handle">@higilarsantamaria</span>
            <div class="divider"></div>
            <p class="tagline">Higienizando no aconchego do seu Lar</p>
        </div>

        <!-- Selo de confiança -->
        <div class="trust-badge">
            <span class="years">+10 anos</span>
            <span class="desc">de experiência em<br>limpeza profissional</span>
        </div>

        <!-- Botões de link -->
        <div class="links-list">
            <a href="https://wa.me/message/GV7ARQPONRUNO1" target="_blank" rel="noopener" class="link-btn btn-whatsapp">
                <span class="link-icon">💬</span>
                <span class="link-label">Chame no WhatsApp</span>
            </a>
            <a href="https://www.higilarsantamaria.com.br/" target="_blank" rel="noopener" class="link-btn btn-site">
                <span class="link-icon">🌐</span>
                <span class="link-label">Visite nosso Site</span>
            </a>
            <a href="https://share.google/JfgZLiqOB0MbOg5kM" target="_blank" rel="noopener" class="link-btn btn-google">
                <span class="link-icon">⭐</span>
                <span class="link-label">Avaliações no Google</span>
            </a>
            <a href="https://www.facebook.com/higilarsm/reviews/" target="_blank" rel="noopener" class="link-btn btn-facebook">
                <span class="link-icon">👍</span>
                <span class="link-label">Avaliações no Facebook</span>
            </a>
            <a href="https://www.instagram.com/higilarsantamaria/" target="_blank" rel="noopener" class="link-btn btn-instagram">
                <span class="link-icon">📸</span>
                <span class="link-label">Instagram</span>
            </a>
        </div>

        <a href="https://www.higilarsantamaria.com.br/" class="footer-link">
            higilarsantamaria.com.br
        </a>

    </div>

</body>
</html>
